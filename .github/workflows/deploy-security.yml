name: CI/CD - Déploiement Sécurité Infogérée

# Le pipeline se déclenche uniquement sur une modification de la branche principale (main)
on:
  push:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # ETAPE 1 : INTÉGRATION CONTINUE (Validation & Analyse)
  # ----------------------------------------------------
  Validation-CI:
    runs-on: windows-latest # Agent public GitHub (parfait pour l'analyse de code isolée)
    
    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    # 1. Scan pour détecter les fuites de mots de passe ou clés en clair dans le code
    - name: Détection de secrets (TruffleHog ou Gitleaks)
      uses: trufflehog/trufflehog-actions@main
      with:
        base: ""
        head: ${{ github.ref_name }}

    # 2. Analyse de la qualité et de la sécurité des scripts PowerShell
    - name: Analyse statique de sécurité (PSScriptAnalyzer)
      shell: pwsh
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
        $errors = Invoke-ScriptAnalyzer -Path "./scripts" -Recurse -Severity Error
        if ($errors) {
            Write-Error "Des vulnérabilités ou erreurs ont été trouvées dans les scripts !"
            exit 1
        }

  # ----------------------------------------------------
  # ETAPE 2 : DÉPLOIEMENT CONTINU (Exécution Sécurisée)
  # ----------------------------------------------------
  Deploiement-CD:
    needs: Validation-CI # Ne s'exécute QUE si l'étape de validation a réussi
    environment: Production # Déclenche l'approbation manuelle définie à l'Étape 2
    
    # /!\ ATTENTION /!\ Pour votre vraie infrastructure Tier 0/Tier 1, vous devez remplacer 
    # 'windows-latest' par le nom de votre agent privé installé localement (ex: runs-on: [self-hosted, secure-zone])
    runs-on: windows-latest 

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    # 1. Application de la configuration avec injection dynamique du secret
    - name: Exécuter le script de durcissement (GPO/JEA)
      shell: pwsh
      env:
        # Récupération sécurisée du mot de passe depuis le coffre-fort d'environnement GitHub
        SECURE_PWD: ${{ secrets.ADMIN_PASSWORD }} 
      run: |
        ./scripts/Apply-Hardening.ps1 -SecretPassword "$env:SECURE_PWD" -Environment "Production"

    # 2. Tests de validation de l'état de l'infrastructure (Framework Pester)
    - name: Vérification post-déploiement (Tests Pester)
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck
        $result = Invoke-Pester -Path "./tests/Infrastructure.Tests.ps1" -Passthru
        if ($result.FailedCount -gt 0) {
            Write-Error "Le déploiement a altéré la conformité d'un service critique. Rollback requis !"
            exit 1
        }
